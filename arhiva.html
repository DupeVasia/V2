    <style>
      .archive-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 40px;
      }
      .sticky-note {
        background: #fff9c4;
        padding: 20px;
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.1);
        transform: rotate(-1deg);
        transition: var(--transition);
        border-left: 5px solid #fbc02d;
      }
      .sticky-note:nth-child(even) {
        transform: rotate(2deg);
        background: #f0f4c3;
        border-left-color: #afb42b;
      }
      .sticky-note:hover {
        transform: scale(1.05) rotate(0deg);
        z-index: 10;
      }
      .homework-form {
        background: var(--white);
        padding: 40px;
        border-radius: 15px;
        box-shadow: var(--shadow);
        margin-top: 60px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-family: inherit;
      }
    </style>

<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drumul Mariei - Cartografia Credinței</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Roboto:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Stil specific pentru schema logică (Integrare Info) */
      .flowchart {
        background: #fff;
        padding: 20px;
        border: 2px dashed #8b4513;
        border-radius: 10px;
        font-family: "Courier New", monospace;
      }
      .step {
        background: #f4f1ea;
        border: 1px solid #333;
        padding: 10px;
        margin: 10px 0;
        text-align: center;
        position: relative;
      }
      .decision {
        background: #e0d7cc;
        clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        padding: 20px 10px;
        margin: 20px 0;
      }

      /* Harta Amintirilor Styles */
      .map-wrap {
        max-width: 1400px;
        margin: 40px auto;
        padding: 10px 20px;
      }

      .map-box {
        background: white;
        border: 1px solid #ddd;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 4px 30px rgba(100,140,180,0.15);
        min-height: 600px;
      }

      svg.map { width: 100%; display: block; }

      .route-line {
        stroke: #3a7abf;
        stroke-width: 1.8;
        fill: none;
        stroke-dasharray: 8 5;
        stroke-linecap: round;
        animation: dash 2.5s linear infinite;
        opacity: 0.45;
      }

      @keyframes dash { to { stroke-dashoffset: -52; } }

      .map-point { cursor: pointer; }

      .map-point .ring {
        fill: none; stroke: #3a7abf;
        stroke-width: 1; opacity: 0;
        transition: opacity 0.25s;
      }
      .map-point:hover .ring { opacity: 0.3; }

      .map-point .dot-bg {
        fill: white; stroke: #c9d8e8; stroke-width: 1.5;
        transition: stroke 0.2s, filter 0.2s;
      }
      .map-point:hover .dot-bg,
      .map-point.active .dot-bg {
        stroke: #3a7abf;
        filter: drop-shadow(0 0 6px rgba(58,122,191,0.5));
      }

      .map-point .dot-in { fill: #c9d8e8; transition: fill 0.2s; }
      .map-point:hover .dot-in,
      .map-point.active .dot-in { fill: #3a7abf; }

      .map-point .lbl-n {
        fill: #1c2a38; font-family: 'Playfair Display', serif;
        font-size: 9px; font-style: italic; pointer-events: none;
      }
      .map-point .lbl-p {
        fill: #4a6680; font-family: 'Playfair+Display', serif;
        font-size: 11px; pointer-events: none;
      }

      .overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(28,42,56,0.5);
        backdrop-filter: blur(5px);
        z-index: 500;
        align-items: center; justify-content: center;
        padding: 20px;
      }
      .overlay.open { display: flex; animation: fadeIn 0.2s ease; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

      .panel {
        background: white;
        border-radius: 8px;
        max-width: 480px; width: 100%;
        box-shadow: 0 24px 80px rgba(20,40,60,0.3), 0 0 0 1px #c9d8e8;
        overflow: hidden;
        animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        position: relative;
      }

      @keyframes slideUp {
        from { transform: translateY(28px) scale(0.96); opacity: 0; }
        to   { transform: translateY(0)    scale(1);    opacity: 1; }
      }

      .p-progress { height: 3px; background: #e8eef5; }
      .p-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #c9d8e8, #3a7abf);
        transition: width 0.35s;
      }

      .p-close {
        position: absolute; top: 14px; right: 14px;
        width: 30px; height: 30px;
        border: 1px solid #c9d8e8; border-radius: 50%;
        background: #f8f9fb; color: #4a6680;
        font-size: 0.95rem; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, color 0.2s; z-index: 10;
      }
      .p-close:hover { background: #1c2a38; color: white; border-color: #1c2a38; }

      .p-header {
        padding: 26px 28px 20px;
        border-bottom: 1px solid #e8eef5;
        position: relative;
      }

      .p-num {
        font-family: 'Playfair Display', serif;
        font-size: 4rem; font-style: italic;
        color: #e8eef5;
        position: absolute; top: 8px; right: 18px;
        line-height: 1; user-select: none; pointer-events: none;
      }

      .p-tag {
        font-size: 0.68rem; letter-spacing: 0.35em;
        text-transform: uppercase; color: #3a7abf;
        margin-bottom: 8px;
        display: flex; align-items: center; gap: 8px;
      }
      .p-tag::before {
        content: ''; width: 20px; height: 1px;
        background: #3a7abf; opacity: 0.5; display: inline-block;
      }

      .p-place {
        font-family: 'Playfair Display', serif;
        font-size: 1.65rem; font-weight: 400;
        color: #1c2a38; margin-bottom: 4px;
      }

      .p-date { font-size: 0.85rem; color: #4a6680; letter-spacing: 0.08em; }

      .p-body { padding: 22px 28px 26px; }

      .p-icon { font-size: 2rem; display: block; margin-bottom: 14px; }

      .p-quote {
        font-style: italic; font-size: 1.05rem;
        line-height: 1.7; color: #1c2a38;
        border-left: 3px solid #c9d8e8;
        padding-left: 16px; margin-bottom: 18px;
        position: relative;
      }
      .p-quote::before {
        content: '"';
        font-family: 'Playfair Display', serif;
        font-size: 3rem; color: #c9d8e8;
        position: absolute; top: -10px; left: -8px; line-height: 1;
      }

      .p-desc { font-size: 0.95rem; line-height: 1.7; color: #4a6680; }

      .p-nav {
        display: flex; justify-content: space-between; align-items: center;
        padding: 14px 28px;
        border-top: 1px solid #e8eef5;
        background: #f8f9fb;
      }

      .nav-btn {
        font-size: 0.8rem; letter-spacing: 0.1em;
        color: #3a7abf; cursor: pointer;
        background: none; border: 1px solid #c9d8e8;
        padding: 6px 14px; border-radius: 3px;
        transition: all 0.2s;
        font-family: 'Roboto', sans-serif;
      }
      .nav-btn:hover { background: #3a7abf; color: white; border-color: #3a7abf; }
      .nav-btn:disabled { opacity: 0.3; pointer-events: none; }

      .nav-dots { display: flex; gap: 6px; }

      .nav-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #c9d8e8; transition: background 0.2s;
        cursor: pointer;
      }
      .nav-dot.active { background: #3a7abf; }

      .snow-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        overflow: hidden;
      }

      .flake {
        position: absolute;
        top: -10px;
        color: rgba(140,190,225,0.55);
        animation: fall linear infinite;
        user-select: none;
      }

      @keyframes fall {
        to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
      }
    </style>
  </head>

      <div class="map-wrap">

            <!-- Labels -->

            <text x="335" y="172" font-family="Roboto,sans-serif" font-size="9" fill="rgba(74,102,128,0.35)" letter-spacing="1" text-anchor="middle">UCRAINA</text>

        </div>
      </div>

    <!-- OVERLAY PANEL -->
    <div class="overlay" id="overlay" onclick="closeOnOverlay(event)">
      <div class="panel" id="panel">
        <div class="p-progress"><div class="p-progress-fill" id="pFill"></div></div>
        <button class="p-close" onclick="closePanel()">✕</button>
        <div class="p-header">
          <div class="p-num" id="pNum"></div>
          <p class="p-tag" id="pTag"></p>
          <h2 class="p-place" id="pPlace"></h2>
          <p class="p-date" id="pDate"></p>
        </div>
        <div class="p-body">
          <span class="p-icon" id="pIcon"></span>
          <p class="p-quote" id="pQuote"></p>
          <p class="p-desc" id="pDesc"></p>
        </div>
        <div class="p-nav">
          <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">← Anterior</button>
          <div class="nav-dots" id="navDots"></div>
          <button class="nav-btn" id="btnNext" onclick="navigate(1)">Următor →</button>
        </div>
      </div>
    </div>

      <p>&copy; 2026 - Proiect Literar Digital. Integrare Informatică.</p>
    </footer>

    <script>
      // Snow
      const sl = document.getElementById('snowLayer');
      for (let i = 0; i < 45; i++) {
        const f = document.createElement('div');
        f.className = 'flake';
        f.textContent = ['❄','❅','❆','·','✦'][Math.floor(Math.random()*5)];
        f.style.cssText = `left:${Math.random()*100}vw;font-size:${6+Math.random()*12}px;animation-duration:${6+Math.random()*10}s;animation-delay:${-Math.random()*10}s;opacity:${0.25+Math.random()*0.45};`;
        sl.appendChild(f);
      }

      const pts = [
        { num:'I',   tag:'Punct 1 · Origine',    place:'Satul natal, Basarabia',   date:'Înainte de 1941',  icon:'🏡',
          quote:'Acasă era locul unde pâinea mirosea a duminică și câmpurile nu aveau capăt.',
          desc:'Copilăria Mariei în Basarabia — viața rurală, familia, tradițiile și pământul moștenit din generații. Un loc al liniștii care urma să fie smuls brutal.' },
        { num:'II',  tag:'Punct 2 · Ridicarea',   place:'Chișinău',                 date:'13 iunie 1941',    icon:'🚨',
          quote:'Nimeni nu știa unde mergem. Soldații nu răspundeau. Era noapte și frica nu mai avea formă.',
          desc:'Operațiunea sovietică de deportare: zeci de mii de basarabeni ridicați din case în toiul nopții. Familii despărțite, bagaje minime, nicio explicație.' },
        { num:'III', tag:'Punct 3 · Transportul', place:'Gara — Vagonul de Vite',   date:'Vară, 1941',       icon:'🚂',
          quote:'Vagoanele nu aveau ferestre. Aerul era al tuturor și nu era destul pentru nimeni.',
          desc:'Săptămâni întregi în vagoane de marfă suprapopulate, fără apă sau hrană suficientă. Mulți nu au supraviețuit acestui drum al suferinței.' },
        { num:'IV',  tag:'Punct 4 · Granița',     place:'Munții Urali',             date:'Iulie 1941',       icon:'⛰️',
          quote:'Dincolo de munți simțeam că Europa rămâne în urmă — ca o ușă care se închide fără cheie.',
          desc:'Trecerea Uralilor — granița simbolică și geografică dintre Europa și Asia. Momentul în care întoarcerea devenea greu de imaginat.' },
        { num:'V',   tag:'Punct 5 · Destinația',  place:'Siberia — Lagărul',        date:'1941 – 1956',      icon:'❄️',
          quote:'Frigul siberian nu era doar al iernii — era în oameni, în tăcere, în uitarea celor de acasă.',
          desc:'Ani de muncă forțată la temperaturi de -40°C. Maria supraviețuiește, păstrând vie memoria satului natal și speranța întoarcerii acasă.' }
      ];

      let cur = 0;

      const dotsEl = document.getElementById('navDots');
      for (let i = 0; i < 5; i++) {
        const d = document.createElement('div');
        d.className = 'nav-dot';
        d.onclick = () => { cur = i; renderPanel(); updateActivePoint(); };
        dotsEl.appendChild(d);
      }

      function openPanel(n) {
        cur = n - 1;
        renderPanel();
        document.getElementById('overlay').classList.add('open');
        updateActivePoint();
      }

      function renderPanel() {
        const p = pts[cur];
        document.getElementById('pNum').textContent   = p.num;
        document.getElementById('pTag').textContent   = p.tag;
        document.getElementById('pPlace').textContent = p.place;
        document.getElementById('pDate').textContent  = p.date;
        document.getElementById('pIcon').textContent  = p.icon;
        document.getElementById('pQuote').textContent = p.quote;
        document.getElementById('pDesc').textContent  = p.desc;
        document.getElementById('pFill').style.width  = ((cur+1)/5*100) + '%';
        document.getElementById('btnPrev').disabled   = cur === 0;
        document.getElementById('btnNext').disabled   = cur === 4;
        dotsEl.querySelectorAll('.nav-dot').forEach((d,i) => d.classList.toggle('active', i===cur));
      }

      function updateActivePoint() {
        for (let i = 1; i <= 5; i++) document.getElementById('mp'+i).classList.remove('active');
        document.getElementById('mp'+(cur+1)).classList.add('active');
      }

      function navigate(dir) {
        if (cur+dir < 0 || cur+dir > 4) return;
        cur += dir;
        renderPanel();
        updateActivePoint();
      }

      function closePanel() {
        document.getElementById('overlay').classList.remove('open');
        for (let i = 1; i <= 5; i++) document.getElementById('mp'+i).classList.remove('active');
      }

      function closeOnOverlay(e) { if (e.target === document.getElementById('overlay')) closePanel(); }

      document.addEventListener('keydown', e => {
        if (!document.getElementById('overlay').classList.contains('open')) return;
        if (e.key === 'Escape') closePanel();
        if (e.key === 'ArrowRight') navigate(1);
        if (e.key === 'ArrowLeft') navigate(-1);
      });
    </script>

    <script src="script.js"></script>
